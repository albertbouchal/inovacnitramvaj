<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PID Tram Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f10;
      --surface: #151819;
      --border:  #242829;
      --muted:   #3a3f42;
      --text:    #c8ced1;
      --dim:     #6b7478;
      --accent:  #e8c840;
      --green:   #4fc38a;
      --red:     #e05a4e;
      --mono:    'Space Mono', monospace;
      --sans:    'Barlow Condensed', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .logo {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .logo span { color: var(--dim); font-weight: 300; }
    .header-meta {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex: 1;
    }
    .pulse {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      margin-right: 6px;
      animation: blink 2s infinite;
    }
    .pulse.offline { background: var(--red); animation: none; }
    .pulse.searching { background: var(--accent); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    main {
      flex: 1;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 760px;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    label.field-label {
      font-size: 11px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    input[type="text"], input[type="number"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      padding: 8px 12px;
      width: 110px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }

    /* Primary button — glowing yellow */
    .btn-primary {
      background: var(--accent);
      color: #0d0f10;
      border: none;
      font-family: var(--sans);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 22px;
      cursor: pointer;
      transition: box-shadow 0.2s, opacity 0.15s;
      box-shadow: 0 0 12px 2px rgba(232,200,64,0.35);
    }
    .btn-primary:hover { box-shadow: 0 0 20px 4px rgba(232,200,64,0.55); }
    .btn-primary:disabled { opacity: 0.4; cursor: default; box-shadow: none; }

    /* Secondary button — quiet outline */
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dim);
      font-family: var(--sans);
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 9px 18px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-secondary:disabled { opacity: 0.35; cursor: default; }

    /* Monitor toggle */
    .monitor-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: 4px;
    }
    .monitor-label {
      font-family: var(--sans);
      font-size: 13px;
      color: var(--dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
    }
    /* custom toggle switch */
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }
    .toggle input { display: none; }
    .toggle-track {
      width: 36px;
      height: 20px;
      background: var(--muted);
      border-radius: 10px;
      transition: background 0.2s;
      position: absolute;
      top: 0; left: 0;
    }
    .toggle input:checked + .toggle-track { background: var(--accent); }
    .toggle-thumb {
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 3px; left: 3px;
      transition: left 0.2s;
      pointer-events: none;
    }
    .toggle input:checked ~ .toggle-thumb { left: 19px; }

    .interval-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.2s;
    }
    .interval-wrap.hidden { opacity: 0.3; pointer-events: none; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px 28px;
    }
    .card-label {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      color: var(--dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .vehicle-status { display: grid; grid-template-columns: auto 1fr; }
    .line-badge {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 72px;
      line-height: 1;
      color: var(--accent);
      padding-right: 28px;
      border-right: 1px solid var(--border);
      margin-right: 28px;
      display: flex;
      align-items: center;
      min-width: 120px;
      justify-content: center;
    }
    .vehicle-details { display: flex; flex-direction: column; gap: 12px; justify-content: center; }
    .detail-row { display: flex; flex-direction: column; gap: 2px; }
    .detail-key { font-size: 10px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; }
    .detail-val { font-family: var(--sans); font-size: 22px; font-weight: 500; color: var(--text); letter-spacing: 0.02em; }
    .detail-val.accent { color: var(--accent); }
    .detail-val.muted  { color: var(--muted); font-size: 16px; }
    .detail-val a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--muted); padding-bottom: 1px; }
    .detail-val a:hover { border-color: var(--accent); }

    .state-msg { padding: 32px 0; text-align: center; color: var(--dim); font-size: 13px; letter-spacing: 0.06em; }
    .state-msg.error { color: var(--red); }

    .log {
      font-size: 11px;
      color: var(--dim);
      border-top: 1px solid var(--border);
      margin-top: 20px;
      padding-top: 14px;
      max-height: 130px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .log-entry { letter-spacing: 0.03em; font-family: var(--mono); }
    .log-entry.ok   { color: var(--green); }
    .log-entry.err  { color: var(--red); }
    .log-entry.warn { color: var(--accent); }

    footer {
      border-top: 1px solid var(--border);
      padding: 12px 28px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }
    footer a { color: var(--dim); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @media (max-width: 540px) {
      .vehicle-status { grid-template-columns: 1fr; }
      .line-badge {
        font-size: 48px;
        border-right: none; border-bottom: 1px solid var(--border);
        padding-right: 0; padding-bottom: 16px;
        margin-right: 0; margin-bottom: 16px;
        min-width: unset;
      }
      .controls { gap: 8px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">PID <span>/</span> Tram Tracker</div>
  <div class="header-meta">
    <span class="pulse offline" id="statusDot"></span>
    <span id="statusText">Idle</span>
  </div>
  <div style="font-size:11px;color:var(--dim);letter-spacing:0.05em;">
    Updated: <span id="lastUpdated">—</span>
  </div>
</header>

<main>

  <div class="controls">
    <label class="field-label" for="carInput">Car №</label>
    <input type="text" id="carInput" value="9277" maxlength="6" />

    <button class="btn-primary" id="checkBtn" onclick="checkOnce()">Check</button>

    <div class="monitor-wrap">
      <label class="toggle" for="monitorToggle" title="Continuous monitoring">
        <input type="checkbox" id="monitorToggle" onchange="toggleMonitor()" />
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
      <label class="monitor-label" for="monitorToggle">Monitor</label>
    </div>

    <div class="interval-wrap" id="intervalWrap">
      <label class="field-label" for="intervalInput">every</label>
      <input type="number" id="intervalInput" value="30" min="15" max="300" style="width:64px;" />
      <label class="field-label">s</label>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Vehicle Status — Car <span id="cardCarNum">9277</span></div>

    <div class="state-msg" id="idleMsg">Press <strong style="color:var(--accent)">Check</strong> to look up the car.</div>
    <div class="state-msg" id="searchingMsg" style="display:none;">Searching all active trams…</div>

    <div class="vehicle-status" id="vehicleInfo" style="display:none;">
      <div class="line-badge" id="lineBadge">—</div>
      <div class="vehicle-details">
        <div class="detail-row">
          <div class="detail-key">Direction</div>
          <div class="detail-val accent" id="headsign">—</div>
        </div>
        <div class="detail-row">
          <div class="detail-key">Last stop</div>
          <div class="detail-val" id="lastStop">—</div>
        </div>
        <div class="detail-row">
          <div class="detail-key">Status</div>
          <div class="detail-val muted" id="tripStatus">—</div>
        </div>

      </div>
    </div>

    <div class="state-msg error" id="errorMsg" style="display:none;"></div>

    <div class="state-msg" id="notFoundMsg" style="display:none;">
      Car <strong id="notFoundNum" style="color:var(--accent);"></strong> not found —
      possibly in depot or off service.
    </div>

    <div class="log" id="logBox"></div>
  </div>

</main>

<footer>
  <span>Data: <a href="https://api.golemio.cz" target="_blank">Golemio / Operator ICT</a> · PID Prague</span>
  <span id="footerCar">Car 9277</span>
</footer>

<script>
  const WORKER = 'https://nameless-pond-5886.albertbouchalcz.workers.dev';

  // State
  let monitorInterval = null;
  let cachedTripId    = null; // once found, poll this specific trip
  let lastCarNum      = null;
  const stopCache     = {};

  // ── UI helpers ────────────────────────────────────────────────────────────
  function log(msg, type = '') {
    const box = document.getElementById('logBox');
    const d   = document.createElement('div');
    d.className = 'log-entry' + (type ? ' ' + type : '');
    const t = new Date().toLocaleTimeString('cs-CZ', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    d.textContent = t + '  ' + msg;
    box.insertBefore(d, box.firstChild);
    if (box.children.length > 60) box.removeChild(box.lastChild);
  }

  function setStatus(state, text) {
    const dot = document.getElementById('statusDot');
    dot.className = 'pulse ' + state; // 'offline' | 'searching' | ''
    document.getElementById('statusText').textContent = text;
  }

  function showPanel(which, extra) {
    ['idleMsg','searchingMsg','vehicleInfo','errorMsg','notFoundMsg'].forEach(id => {
      document.getElementById(id).style.display = 'none';
    });
    if (which === 'vehicle')    { document.getElementById('vehicleInfo').style.display = 'grid'; }
    else if (which === 'error') { const e = document.getElementById('errorMsg'); e.style.display = ''; e.textContent = extra; }
    else if (which === 'notfound') { document.getElementById('notFoundMsg').style.display = ''; document.getElementById('notFoundNum').textContent = extra; }
    else if (which === 'searching') { document.getElementById('searchingMsg').style.display = ''; }
    else { document.getElementById('idleMsg').style.display = ''; }
  }

  async function resolveStopName(stopId) {
    if (!stopId) return '—';
    if (stopCache[stopId]) return stopCache[stopId];
    try {
      const res = await fetch(WORKER + '/stop?id=' + encodeURIComponent(stopId));
      if (res.ok) {
        const d = await res.json();
        if (d.name) { stopCache[stopId] = d.name; return d.name; }
      }
    } catch (_) {}
    stopCache[stopId] = stopId;
    return stopId;
  }

  function renderVehicle(data, carStr) {
    document.getElementById('lineBadge').textContent   = data.line;
    document.getElementById('headsign').textContent    = data.headsign;
    document.getElementById('tripStatus').textContent  = data.canceled ? 'Cancelled' : 'In service';
    document.getElementById('lastStop').textContent    = data.last_stop || '—';

    // Resolve stop name asynchronously
    resolveStopName(data.last_stop).then(name => {
      document.getElementById('lastStop').textContent = name;
    });

    showPanel('vehicle');
    setStatus('', 'Live');
    const now = new Date().toLocaleTimeString('cs-CZ', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    document.getElementById('lastUpdated').textContent = now;
    log('Car ' + carStr + ' → Line ' + data.line + ' → ' + data.headsign + ' | trip: ' + data.trip_id, 'ok');
  }

  // ── Phase 1: find the car (paginated search, done by worker) ─────────────
  async function findCar(carNum, carStr) {
    setStatus('searching', 'Searching…');
    showPanel('searching');
    log('Searching all active trams for car ' + carStr + '…');

    let data;
    try {
      const res = await fetch(WORKER + '/find/' + carNum);
      if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + await res.text());
      data = await res.json();
    } catch (err) {
      log('Error: ' + err.message, 'err');
      showPanel('error', 'Fetch failed: ' + err.message);
      setStatus('offline', 'Error');
      return false;
    }

    if (!data.found) {
      log('Car ' + carStr + ' not found in active tram fleet.', 'warn');
      showPanel('notfound', carStr);
      setStatus('offline', 'Not found');
      cachedTripId = null;
      return false;
    }

    cachedTripId = data.trip_id;
    log('Found! trip_id locked: ' + cachedTripId, 'ok');
    renderVehicle(data, carStr);
    return true;
  }

  // ── Phase 2: poll the cached trip_id (1 request) ─────────────────────────
  async function pollTrip(carStr) {
    if (!cachedTripId) return findCar(parseInt(carStr, 10), carStr);

    let data;
    try {
      const res = await fetch(WORKER + '/track/' + encodeURIComponent(cachedTripId));
      if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + await res.text());
      data = await res.json();
    } catch (err) {
      log('Poll error: ' + err.message, 'err');
      setStatus('offline', 'Error');
      return;
    }

    if (!data.found) {
      // Trip ended (end of shift, returned to depot) — re-search
      log('Trip ' + cachedTripId + ' ended. Re-searching…', 'warn');
      cachedTripId = null;
      await findCar(parseInt(carStr, 10), carStr);
      return;
    }

    const now = new Date().toLocaleTimeString('cs-CZ', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    document.getElementById('lastUpdated').textContent = now;
    renderVehicle(data, carStr);
  }

  // ── Controls ──────────────────────────────────────────────────────────────
  async function checkOnce() {
    const carStr = document.getElementById('carInput').value.trim();
    const carNum = parseInt(carStr, 10);
    if (!carStr || isNaN(carNum)) return;

    document.getElementById('cardCarNum').textContent = carStr;
    document.getElementById('footerCar').textContent  = 'Car ' + carStr;

    // If car changed, forget cached trip
    if (carStr !== lastCarNum) {
      cachedTripId = null;
      lastCarNum   = carStr;
    }

    document.getElementById('checkBtn').disabled = true;
    await pollTrip(carStr);
    document.getElementById('checkBtn').disabled = false;
  }

  function toggleMonitor() {
    const on  = document.getElementById('monitorToggle').checked;
    const iw  = document.getElementById('intervalWrap');
    iw.classList.toggle('hidden', !on);

    if (on) {
      const secs = Math.max(15, parseInt(document.getElementById('intervalInput').value) || 30);
      log('Monitor ON — refreshing every ' + secs + 's.', 'ok');
      // Don't fire immediately — checkOnce() was just called (or user will call it)
      monitorInterval = setInterval(() => {
        const carStr = document.getElementById('carInput').value.trim();
        document.getElementById('cardCarNum').textContent = carStr;
        document.getElementById('footerCar').textContent  = 'Car ' + carStr;
        pollTrip(carStr);
      }, secs * 1000);
    } else {
      if (monitorInterval) { clearInterval(monitorInterval); monitorInterval = null; }
      setStatus(cachedTripId ? '' : 'offline', cachedTripId ? 'Live (paused)' : 'Stopped');
      log('Monitor OFF.');
    }
  }

  // Reset monitor if interval changes
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('intervalInput').addEventListener('change', () => {
      if (document.getElementById('monitorToggle').checked) {
        document.getElementById('monitorToggle').checked = false;
        toggleMonitor();
      }
    });
  });
</script>

</body>
</html>
